name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Package plugin
        run: |
          mkdir -p package/deck-localize
          cp plugin.json main.py package/deck-localize/
          cp -r dist package/deck-localize/
          cd package && zip -r ../deck-localize.zip deck-localize/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: deck-localize.zip
          generate_release_notes: true
